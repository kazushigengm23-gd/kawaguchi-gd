<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>川口GD 2026 打撃成績</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  /* チームカラー: 黒・白・金・黄 */
  --gold:#D4A017;
  --gold-l:#F5E6A3;
  --gold-d:#A07810;
  --yellow:#F5D020;
  --black:#111110;
  --black-2:#1C1C1A;
  --black-3:#252523;
  --black-4:#2F2F2C;
  --white:#FFFFFF;
  --off-white:#F5F4EF;
  --gray-light:#E8E6DF;
  --gray-mid:#9A9890;
  --gray-dark:#5A5956;
  --text-on-dark:#F5F4EF;
  --text-muted-dark:rgba(245,244,239,0.5);
  --border-dark:rgba(255,255,255,0.08);
  --border-gold:rgba(212,160,23,0.35);
  --safe-bottom:env(safe-area-inset-bottom,0px);

  /* Good/warn/bad on dark bg */
  --good:#4FC98A;
  --warn:#F5D020;
  --bad:#E05A3A;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overscroll-behavior:none;}
body{
  font-family:'Noto Sans JP',sans-serif;
  background:var(--black);
  color:var(--text-on-dark);
  min-height:100vh;
  font-size:15px;
}

/* ── HEADER ── */
header{
  background:var(--black);
  border-bottom:1px solid var(--border-dark);
  height:54px;display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;position:sticky;top:0;z-index:300;
}
.logo{
  font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:.08em;
  color:var(--white);display:flex;align-items:center;gap:6px;
}
.logo-gd{color:var(--gold);}
.logo-divider{width:2px;height:18px;background:var(--gold);opacity:.6;border-radius:1px;}
.logo-year{font-size:13px;color:var(--gray-mid);letter-spacing:.05em;}
.hbadge{
  font-size:11px;font-weight:700;
  background:var(--gold);color:var(--black);
  padding:4px 10px;border-radius:20px;letter-spacing:.03em;
}

/* ── BOTTOM NAV ── */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:300;
  background:var(--black-2);
  border-top:1px solid var(--border-dark);
  display:flex;
  padding-bottom:var(--safe-bottom);
}
.bnav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:10px 4px 8px;border:none;background:transparent;cursor:pointer;
  font-family:'Noto Sans JP',sans-serif;font-size:10px;font-weight:700;
  color:var(--gray-dark);gap:3px;transition:color .15s;
  letter-spacing:.03em;
}
.bnav-btn.active{color:var(--gold);}
.bnav-icon{font-size:18px;line-height:1;}
.bnav-active-bar{
  position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:24px;height:2px;background:var(--gold);border-radius:0 0 2px 2px;
  opacity:0;transition:opacity .15s;
}
.bnav-btn{position:relative;}
.bnav-btn.active .bnav-active-bar{opacity:1;}

/* ── PAGES ── */
.page{display:none;padding:16px 16px calc(76px + var(--safe-bottom));max-width:600px;margin:0 auto;}
.page.active{display:block;}

/* ── PLAYER SELECTOR ── */
.sel-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.sel-bar label{font-size:11px;font-weight:700;color:var(--gray-mid);white-space:nowrap;letter-spacing:.05em;text-transform:uppercase;}
.sel-wrap{position:relative;flex:1;}
.sel-wrap select{
  width:100%;font-family:'Noto Sans JP',sans-serif;
  font-size:15px;font-weight:700;
  color:var(--gold);
  background:var(--black-3);
  border:1.5px solid var(--border-gold);
  border-radius:10px;padding:11px 36px 11px 14px;
  appearance:none;cursor:pointer;
}
.sel-arrow{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--gold);font-size:11px;pointer-events:none;}

/* ── HERO ── */
.hero{
  background:var(--black-2);
  border:1px solid var(--border-dark);
  border-radius:16px;padding:18px 16px;margin-bottom:14px;
  position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--gold),var(--yellow),var(--gold));
}
.hero-top{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.hero-num{
  font-family:'Bebas Neue',sans-serif;font-size:56px;line-height:1;
  color:var(--gold);opacity:.25;min-width:54px;text-align:center;
}
.hero-name{font-size:21px;font-weight:700;color:var(--white);}
.hero-pa{font-size:12px;color:var(--gray-mid);margin-top:3px;}

/* OPS big */
.ops-big{
  background:rgba(212,160,23,0.12);
  border:1px solid var(--border-gold);
  border-radius:12px;padding:14px;margin-bottom:12px;
  display:flex;align-items:center;gap:12px;
}
.ops-big-label{
  font-size:11px;font-weight:700;color:var(--gold);
  letter-spacing:.08em;text-transform:uppercase;white-space:nowrap;
}
.ops-big-val{font-size:40px;font-weight:700;line-height:1;font-family:'Bebas Neue',sans-serif;letter-spacing:.02em;}
.ops-big-val.good{color:var(--good);}
.ops-big-val.warn{color:var(--warn);}
.ops-big-val.bad{color:var(--bad);}
.ops-big-sub{font-size:11px;color:var(--gray-mid);margin-left:auto;text-align:right;line-height:1.6;}

/* KPI grid */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.kpi{
  background:var(--black-3);border:1px solid var(--border-dark);
  border-radius:10px;padding:11px 12px;
}
.kpi-label{font-size:10px;font-weight:700;color:var(--gray-mid);margin-bottom:4px;letter-spacing:.04em;}
.kpi-val{font-size:21px;font-weight:700;line-height:1;color:var(--white);}
.kpi-val.dim{font-size:17px;color:var(--gray-dark);}
.kpi-def{font-size:9px;color:var(--gray-dark);margin-top:3px;line-height:1.35;}

/* ── SECTION TITLE ── */
.sec-title{
  font-size:10px;font-weight:700;color:var(--gray-mid);
  letter-spacing:.1em;text-transform:uppercase;
  margin-bottom:10px;display:flex;align-items:center;gap:8px;
}
.sec-title::before{content:'';width:3px;height:12px;background:var(--gold);border-radius:2px;flex-shrink:0;}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border-dark);}

/* ── RANK CARDS ── */
.rank-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.rank-card{
  background:var(--black-2);border:1px solid var(--border-dark);
  border-radius:12px;padding:14px;
}
.rc-label{font-size:10px;font-weight:700;color:var(--gray-mid);letter-spacing:.05em;text-transform:uppercase;margin-bottom:2px;}
.rc-def{font-size:9px;color:var(--gray-dark);margin-bottom:8px;line-height:1.35;}
.rc-val{font-size:22px;font-weight:700;color:var(--white);margin-bottom:3px;}
.rc-rank{font-size:12px;color:var(--gray-mid);}
.rc-rank b{color:var(--white);font-weight:700;}
.rbar{margin-top:8px;background:var(--black-4);border-radius:99px;height:4px;}
.rbar-fill{height:4px;border-radius:99px;background:var(--gray-dark);transition:width .4s;}
.rank-card.gold-card{
  border-color:var(--border-gold);
  background:rgba(212,160,23,0.08);
}
.rank-card.gold-card .rc-rank b{color:var(--gold);}
.rank-card.gold-card .rbar-fill{background:var(--gold);}
.rank-card.gold-card .rc-val{color:var(--gold);}
.rank-card.ops-card{
  grid-column:span 2;
  border-color:var(--border-gold);
  background:rgba(212,160,23,0.08);
}
.rank-card.ops-card .rc-val{font-size:28px;color:var(--gold);}
.rank-card.ops-card .rc-rank b{color:var(--gold);}
.rank-card.ops-card .rbar-fill{background:var(--gold);}

/* ── ADVICE ── */
.advice{
  background:var(--black-2);
  border:1px solid var(--border-gold);
  border-radius:12px;padding:14px 16px;margin-bottom:16px;
  display:flex;gap:10px;
}
.advice-icon{font-size:18px;flex-shrink:0;}
.advice-title{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px;}
.advice-text{font-size:13px;line-height:1.75;color:var(--text-on-dark);}

/* ── CHART CARD ── */
.chart-card{
  background:var(--black-2);border:1px solid var(--border-dark);
  border-radius:12px;padding:14px 16px;margin-bottom:14px;
}
.cc-title{font-size:10px;font-weight:700;color:var(--gray-mid);letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px;}
.chart-wrap{position:relative;width:100%;}

/* ── COMPARE ── */
.chip-area{
  background:var(--black-2);border:1px solid var(--border-dark);
  border-radius:12px;padding:14px 16px;margin-bottom:14px;
}
.chip-title{font-size:11px;font-weight:700;color:var(--gray-mid);margin-bottom:12px;letter-spacing:.05em;text-transform:uppercase;}
.chips{display:flex;flex-wrap:wrap;gap:8px;}
.chip{
  display:flex;align-items:center;gap:6px;
  padding:8px 12px;border-radius:20px;
  border:1.5px solid var(--border-dark);background:var(--black-3);
  font-size:13px;font-weight:500;color:var(--gray-mid);
  cursor:pointer;transition:all .15s;user-select:none;
}
.chip input{display:none;}
.chip.checked{background:rgba(212,160,23,0.12);border-color:var(--border-gold);color:var(--gold);}
.chip-check{width:14px;height:14px;border-radius:4px;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;}
.chip.checked .chip-check::after{content:'✓';}
.chip-actions{display:flex;gap:8px;margin-top:12px;align-items:center;}
.btn-cmp{
  font-family:'Noto Sans JP',sans-serif;font-size:14px;font-weight:700;
  padding:12px 20px;
  background:var(--gold);color:var(--black);
  border:none;border-radius:10px;cursor:pointer;flex:1;
  letter-spacing:.03em;
}
.btn-cmp:active{background:var(--gold-d);}
.btn-clr{
  font-family:'Noto Sans JP',sans-serif;font-size:13px;
  padding:11px 14px;background:transparent;
  border:1px solid var(--border-dark);border-radius:10px;
  cursor:pointer;color:var(--gray-mid);
}
.sel-count{font-size:12px;color:var(--gray-mid);}

/* Metric rows */
#cmpResult{display:none;}
.metric-rows{margin-bottom:14px;}
.metric-row{
  background:var(--black-2);border:1px solid var(--border-dark);
  border-radius:12px;padding:14px 16px;margin-bottom:10px;
}
.mr-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;}
.mr-label{font-size:13px;font-weight:700;color:var(--white);}
.mr-def{font-size:10px;color:var(--gray-dark);}
.mr-bars{display:flex;flex-direction:column;gap:9px;}
.mr-bar-row{display:flex;align-items:center;gap:8px;}
.mr-name{font-size:12px;color:var(--gray-mid);min-width:80px;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mr-track{flex:1;background:var(--black-4);border-radius:99px;height:8px;}
.mr-fill{height:8px;border-radius:99px;}
.mr-val{font-size:13px;font-weight:700;min-width:42px;text-align:right;color:var(--white);}
.mr-val.best{color:var(--gold);}

/* Games */
.game-list{display:flex;flex-direction:column;gap:10px;margin-bottom:14px;}
.game-card{
  background:var(--black-2);border:1px solid var(--border-dark);
  border-radius:12px;padding:14px 16px;
}
.game-title{font-size:13px;font-weight:700;color:var(--white);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border-dark);}
.game-date{font-weight:400;color:var(--gray-mid);font-size:12px;}
.game-stats{display:flex;gap:0;}
.gstat{flex:1;text-align:center;}
.gstat-val{font-size:22px;font-weight:700;color:var(--white);}
.gstat-label{font-size:10px;color:var(--gray-mid);margin-top:2px;font-weight:500;}

.legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px;font-size:11px;color:var(--gray-mid);}
.li{display:flex;align-items:center;gap:5px;}
.ld{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
</style>
</head>
<body>

<header>
  <div class="logo">
    川口<span class="logo-gd">GD</span>
    <span class="logo-divider"></span>
    <span class="logo-year">2026</span>
  </div>
  <div class="hbadge">7試合</div>
</header>

<!-- ═══ MY PAGE ═══ -->
<div id="pg-my" class="page active">
  <div class="sel-bar">
    <label>選手</label>
    <div class="sel-wrap">
      <select id="mySelect" onchange="renderMy()"></select>
      <span class="sel-arrow">▼</span>
    </div>
  </div>
  <div id="myHero" class="hero"></div>
  <div class="sec-title">チーム内ランキング</div>
  <div id="myRanks" class="rank-grid"></div>
  <div id="myAdvice" class="advice"></div>
  <div class="chart-card">
    <div class="cc-title">自分 vs チーム平均</div>
    <div class="chart-wrap" style="height:220px"><canvas id="myRadar"></canvas></div>
  </div>
  <div class="chart-card">
    <div class="cc-title">OPS チーム内順位</div>
    <div class="chart-wrap" style="height:220px"><canvas id="myOpsBar"></canvas></div>
  </div>
</div>

<!-- ═══ COMPARE PAGE ═══ -->
<div id="pg-cmp" class="page">
  <div class="chip-area">
    <div class="chip-title">比較する選手を選ぶ（複数可）</div>
    <div class="chips" id="chips"></div>
    <div class="chip-actions">
      <button class="btn-cmp" onclick="renderCmp()">比較する</button>
      <button class="btn-clr" onclick="clearCmp()">クリア</button>
      <span class="sel-count" id="selCount"></span>
    </div>
  </div>
  <div id="cmpResult">
    <div class="sec-title">指標比較</div>
    <div id="metricRows" class="metric-rows"></div>
    <div class="chart-card">
      <div class="cc-title">レーダー比較</div>
      <div class="chart-wrap" style="height:280px"><canvas id="cmpRadar"></canvas></div>
    </div>
  </div>
</div>

<!-- ═══ GAMES PAGE ═══ -->
<div id="pg-games" class="page">
  <div class="sec-title">試合別成績</div>
  <div class="game-list" id="gameList"></div>
  <div class="chart-card">
    <div class="cc-title">得点・安打推移</div>
    <div class="legend">
      <div class="li"><span class="ld" style="background:var(--gold)"></span>得点</div>
      <div class="li"><span class="ld" style="background:var(--gray-mid)"></span>安打</div>
    </div>
    <div class="chart-wrap" style="height:220px"><canvas id="gameChart"></canvas></div>
  </div>
</div>

<!-- ═══ BOTTOM NAV ═══ -->
<div class="bottom-nav">
  <button class="bnav-btn active" onclick="showPage('my',this)">
    <span class="bnav-active-bar"></span>
    <span class="bnav-icon">👤</span>マイページ
  </button>
  <button class="bnav-btn" onclick="showPage('cmp',this)">
    <span class="bnav-active-bar"></span>
    <span class="bnav-icon">⚡</span>選手比較
  </button>
  <button class="bnav-btn" onclick="showPage('games',this)">
    <span class="bnav-active-bar"></span>
    <span class="bnav-icon">📅</span>試合別
  </button>
</div>

  {name:'vs茅ヶ崎①',    date:'2/28',r:9, h:13,bb:9, k:4},
  {name:'vs茅ヶ崎②',    date:'2/28',r:6, h:10,bb:6, k:3},
  {name:'vs大正大学',    date:'3/7', r:6, h:11,bb:6, k:12},
  {name:'vs全浦和野球団', date:'3/14',r:8, h:15,bb:5, k:6},
];

const active=players.filter(p=>p.pa>0);
const qual  =players.filter(p=>p.ab>=QUAL);

// ══════════ NAV ══════════
function showPage(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('pg-'+id).classList.add('active');
  btn.classList.add('active');
}

// ══════════ MY PAGE ══════════
let myRadarC=null,myOpsC=null;

function buildMySelect(){
  const sel=document.getElementById('mySelect');
  active.forEach(p=>{
    const o=document.createElement('option');
    o.value=p.no; o.textContent=`#${p.no}  ${p.name}`; sel.appendChild(o);
  });
}

function opsColor(v){return v>=TEAM_OPS?'good':v>=0.700?'warn':'bad';}

function renderMy(){
  const no=parseInt(document.getElementById('mySelect').value);
  const p=players.find(x=>x.no===no);
  if(!p) return;

  // Hero
  const oc=opsColor(p.ops);
  document.getElementById('myHero').innerHTML=`
    <div class="hero-top">
      <div class="hero-num">${p.no}</div>
      <div>
        <div class="hero-name">${p.name}</div>
        <div class="hero-pa">打席 ${p.pa}　打数 ${p.ab}</div>
      </div>
    </div>
    <div class="ops-big">
      <div>
        <div class="ops-big-label">OPS</div>
        <div class="ops-big-val ${oc}">${p.ops.toFixed(3)}</div>
      </div>
      <div class="ops-big-sub">出塁率 ${p.obp.toFixed(3)}<br>＋ 長打率 ${p.slg.toFixed(3)}</div>
    </div>
    <div class="kpi-grid">
      <div class="kpi">
        <div class="kpi-label">IsoP</div>
        <div class="kpi-val">${p.isop.toFixed(3)}</div>
        <div class="kpi-def">長打率−打率<br>純粋な長打力</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">IsoD</div>
        <div class="kpi-val">${p.isod.toFixed(3)}</div>
        <div class="kpi-def">出塁率−打率<br>純粋な選球眼</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">打率</div>
        <div class="kpi-val dim">${p.avg.toFixed(3)}</div>
        <div class="kpi-def">安打÷打数</div>
      </div>
    </div>`;

  // Ranks
  const rankDefs=[
    {key:'ops', label:'OPS',   def:'出塁率＋長打率',         pool:qual, isOps:true},
    {key:'obp', label:'出塁率',def:'塁に出た割合',            pool:qual},
    {key:'slg', label:'長打率',def:'総塁打÷打数',            pool:qual},
    {key:'isop',label:'IsoP', def:'長打率−打率',            pool:qual},
    {key:'isod',label:'IsoD', def:'出塁率−打率',            pool:qual},
    {key:'pa',  label:'打席数',def:'',                        pool:active},
  ];
  const rankEl=document.getElementById('myRanks');
  rankEl.innerHTML='';
  rankDefs.forEach(m=>{
    const sorted=[...m.pool].sort((a,b)=>b[m.key]-a[m.key]);
    const rank=sorted.findIndex(x=>x.no===p.no)+1;
    if(rank===0) return;
    const total=sorted.length;
    const max=sorted[0][m.key]||1;
    const pct=Math.round((p[m.key]/max)*100);
    const isGold=rank===1;
    const card=document.createElement('div');
    const fmt=m.key==='pa'?v=>v:v=>v.toFixed(3);
    card.className='rank-card'+(m.isOps?' ops-card':isGold?' gold-card':'');
    card.innerHTML=`
      <div class="rc-label">${m.label}</div>
      ${m.def?`<div class="rc-def">${m.def}</div>`:''}
      <div class="rc-val">${fmt(p[m.key])}</div>
      <div class="rc-rank">チーム <b>${rank}位</b> / ${total}人中</div>
      <div class="rbar"><div class="rbar-fill" style="width:${pct}%"></div></div>`;
    rankEl.appendChild(card);
  });

  // Advice
  document.getElementById('myAdvice').innerHTML=`
    <div class="advice-icon">💡</div>
    <div>
      <div class="advice-title">OPS最大化へのアドバイス</div>
      <div class="advice-text">${genAdvice(p)}</div>
    </div>`;

  // Radar
  if(myRadarC){myRadarC.destroy();myRadarC=null;}
  const n=(v,mx)=>Math.max(0,Math.min(100,Math.round((v/mx)*100)));
  myRadarC=new Chart(document.getElementById('myRadar').getContext('2d'),{
    type:'radar',
    data:{
      labels:['OPS','出塁率','長打率','IsoP','IsoD'],
      datasets:[
        {label:p.name,
         data:[n(p.ops,1.5),n(p.obp,.8),n(p.slg,1.0),n(p.isop,.5),n(p.isod,.5)],
         backgroundColor:'rgba(212,160,23,0.15)',borderColor:'#D4A017',borderWidth:2,
         pointBackgroundColor:'#D4A017',pointRadius:4},
        {label:'チーム平均',
         data:[n(TEAM_OPS,1.5),n(TEAM_OBP,.8),n(TEAM_SLG,1.0),n(TEAM_ISOP,.5),n(TEAM_ISOD,.5)],
         backgroundColor:'rgba(245,244,239,0.05)',borderColor:'rgba(245,244,239,0.3)',borderWidth:1.5,
         borderDash:[4,3],pointBackgroundColor:'rgba(245,244,239,0.5)',pointRadius:3},
      ]
    },
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:true,position:'bottom',labels:{color:'#9A9890',font:{size:11},boxWidth:12,padding:10}}},
      scales:{r:{min:0,max:100,
        ticks:{display:false},
        grid:{color:'rgba(255,255,255,0.07)'},
        angleLines:{color:'rgba(255,255,255,0.07)'},
        pointLabels:{color:'#9A9890',font:{size:11}}}}}
  });

  // OPS bar
  if(myOpsC){myOpsC.destroy();myOpsC=null;}
  const sq=[...qual].sort((a,b)=>b.ops-a.ops);
  myOpsC=new Chart(document.getElementById('myOpsBar').getContext('2d'),{
    type:'bar',
    data:{
      labels:sq.map(x=>x.name),
      datasets:[
        {data:sq.map(x=>x.ops),
         backgroundColor:sq.map(x=>x.no===p.no?'#D4A017':'rgba(90,89,86,0.6)'),
         borderRadius:4},
        {data:sq.map(()=>TEAM_OPS),type:'line',
         borderColor:'rgba(245,244,239,0.3)',borderWidth:1.5,borderDash:[4,3],pointRadius:0,fill:false},
      ]
    },
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        y:{min:0,max:1.5,
           ticks:{color:'#5A5956',font:{size:10}},
           grid:{color:'rgba(255,255,255,0.05)'}},
        x:{ticks:{color:'#5A5956',font:{size:10},maxRotation:45},
           grid:{display:false}}}}
  });
}

function genAdvice(p){
  if(p.ab<QUAL) return `打数がまだ少なく、今後の積み上げに注目です。`;
  const wOBP=p.obp<TEAM_OBP,wSLG=p.slg<TEAM_SLG,wIsoP=p.isop<TEAM_ISOP,wIsoD=p.isod<TEAM_ISOD;
  if(p.ops>=1.150){
    if(wIsoD) return `OPS ${p.ops.toFixed(3)}はチームトップクラス。長打力（IsoP ${p.isop.toFixed(3)}）は抜群ですが、選球眼（IsoD ${p.isod.toFixed(3)}）に伸びしろがあります。四球を増やして出塁率を上げられると、OPSはさらに安定します。`;
    if(wIsoP) return `OPS ${p.ops.toFixed(3)}は出塁率に支えられた高水準。長打力（IsoP ${p.isop.toFixed(3)}）を底上げできれば、OPS 1.2台が射程に入ります。`;
    return `OPS ${p.ops.toFixed(3)}はチームトップクラス。出塁率・長打率ともにバランスが取れています。この水準を維持することが最大の貢献です。`;
  }
  if(wOBP&&wSLG) return `出塁率（${p.obp.toFixed(3)}）・長打率（${p.slg.toFixed(3)}）がともにチーム平均以下です。まず四球を意識した選球眼（IsoD向上）で出塁率を固めることが、OPS最大化への近道です。`;
  if(wSLG&&!wOBP) return `出塁率 ${p.obp.toFixed(3)}はチーム平均以上で優秀。長打率 ${p.slg.toFixed(3)}・IsoP ${p.isop.toFixed(3)}の改善がOPS向上への直線距離です。打球の角度・強さへの意識が鍵です。`;
  if(!wSLG&&wOBP) return `長打力（IsoP ${p.isop.toFixed(3)}）は十分あります。出塁率 ${p.obp.toFixed(3)}の底上げが直接OPSに効きます。選球眼（IsoD ${p.isod.toFixed(3)}）を磨いて四球を増やしましょう。`;
  if(wIsoP) return `出塁率・長打率はチーム平均並み。IsoP ${p.isop.toFixed(3)}（長打力）を伸ばせば長打率が上がり、OPSを次のレベルに引き上げられます。`;
  if(wIsoD) return `長打力はあります。IsoD ${p.isod.toFixed(3)}（選球眼）を磨いて出塁率を上げると、OPSの安定感が増します。`;
  return `出塁率・長打率ともにチーム平均水準。どちらかを重点的に伸ばすことでOPSを引き上げましょう。`;
}

// ══════════ COMPARE PAGE ══════════
let cmpRadarC=null;

function buildChips(){
  const wrap=document.getElementById('chips');
  active.forEach(p=>{
    const lbl=document.createElement('label');
    lbl.className='chip'; lbl.dataset.no=p.no;
    lbl.innerHTML=`<input type="checkbox" value="${p.no}" onchange="chipChange(this)"><span class="chip-check"></span>#${p.no} ${p.name}`;
    wrap.appendChild(lbl);
  });
}
function chipChange(inp){
  inp.parentElement.classList.toggle('checked',inp.checked);
  const n=document.querySelectorAll('#chips input:checked').length;
  document.getElementById('selCount').textContent=n?`${n}人選択中`:'';
}
function clearCmp(){
  document.querySelectorAll('#chips input').forEach(i=>i.checked=false);
  document.querySelectorAll('#chips .chip').forEach(c=>c.classList.remove('checked'));
  document.getElementById('selCount').textContent='';
  document.getElementById('cmpResult').style.display='none';
}
function getChecked(){
  const nos=[...document.querySelectorAll('#chips input:checked')].map(i=>parseInt(i.value));
  return players.filter(p=>nos.includes(p.no));
}

function renderCmp(){
  const sel=getChecked();
  if(sel.length<2){alert('2人以上選択してください。');return;}
  document.getElementById('cmpResult').style.display='block';

  const metrics=[
    {key:'ops', label:'OPS',   def:'出塁率＋長打率',           max:1.5, fmt:v=>v.toFixed(3)},
    {key:'obp', label:'出塁率',def:'塁に出た割合',              max:0.8, fmt:v=>v.toFixed(3)},
    {key:'slg', label:'長打率',def:'総塁打÷打数',              max:1.0, fmt:v=>v.toFixed(3)},
    {key:'isop',label:'IsoP', def:'長打率−打率（純粋な長打力）',max:0.5,fmt:v=>v.toFixed(3)},
    {key:'isod',label:'IsoD', def:'出塁率−打率（純粋な選球眼）',max:0.5,fmt:v=>v.toFixed(3)},
    {key:'pa',  label:'打席数',def:'',                           max:40, fmt:v=>v},
    {key:'avg', label:'打率',  def:'安打÷打数',                 max:0.6, fmt:v=>v.toFixed(3)},
    {key:'rbi', label:'打点',  def:'',                           max:15, fmt:v=>v},
    {key:'bb',  label:'四球',  def:'',                           max:15, fmt:v=>v},
    {key:'k',   label:'三振',  def:'',                           max:15, fmt:v=>v},
  ];

  const colors=sel.map((_,i)=>PALETTE[i%PALETTE.length]);
  const wrap=document.getElementById('metricRows');
  wrap.innerHTML='';

  metrics.forEach(m=>{
    const vals=sel.map(p=>p[m.key]);
    const best=Math.max(...vals);
    const div=document.createElement('div');
    div.className='metric-row';
    let html=`<div class="mr-header"><span class="mr-label">${m.label}</span>${m.def?`<span class="mr-def">${m.def}</span>`:''}</div><div class="mr-bars">`;
    sel.forEach((p,i)=>{
      const pct=m.max>0?Math.round((p[m.key]/m.max)*100):0;
      const isBest=p[m.key]===best&&best>0;
      html+=`<div class="mr-bar-row">
        <div class="mr-name">#${p.no} ${p.name}</div>
        <div class="mr-track"><div class="mr-fill" style="width:${pct}%;background:${isBest?colors[i]:colors[i]+'55'}"></div></div>
        <div class="mr-val${isBest?' best':''}">${m.fmt(p[m.key])}</div>
      </div>`;
    });
    html+=`</div>`;
    div.innerHTML=html;
    wrap.appendChild(div);
  });

  // Radar
  if(cmpRadarC){cmpRadarC.destroy();cmpRadarC=null;}
  const n=(v,mx)=>Math.max(0,Math.min(100,Math.round((v/mx)*100)));
  cmpRadarC=new Chart(document.getElementById('cmpRadar').getContext('2d'),{
    type:'radar',
    data:{
      labels:['OPS','出塁率','長打率','IsoP','IsoD'],
      datasets:sel.map((p,i)=>({
        label:`#${p.no} ${p.name}`,
        data:[n(p.ops,1.5),n(p.obp,.8),n(p.slg,1.0),n(p.isop,.5),n(p.isod,.5)],
        backgroundColor:colors[i]+'22',borderColor:colors[i],borderWidth:2,
        pointBackgroundColor:colors[i],pointRadius:4,
      }))
    },
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:true,position:'bottom',labels:{color:'#9A9890',font:{size:11},boxWidth:12,padding:8}}},
      scales:{r:{min:0,max:100,
        ticks:{display:false},
        grid:{color:'rgba(255,255,255,0.07)'},
        angleLines:{color:'rgba(255,255,255,0.07)'},
        pointLabels:{color:'#9A9890',font:{size:11}}}}}
  });

  document.getElementById('cmpResult').scrollIntoView({behavior:'smooth',block:'start'});
}

// ══════════ GAMES PAGE ══════════
function initGames(){
  const list=document.getElementById('gameList');
  games.forEach(g=>{
    const d=document.createElement('div');
    d.className='game-card';
    d.innerHTML=`
      <div class="game-title">${g.name}　<span class="game-date">${g.date}</span></div>
      <div class="game-stats">
        <div class="gstat"><div class="gstat-val">${g.r}</div><div class="gstat-label">得点</div></div>
        <div class="gstat"><div class="gstat-val">${g.h}</div><div class="gstat-label">安打</div></div>
        <div class="gstat"><div class="gstat-val">${g.bb}</div><div class="gstat-label">四球</div></div>
        <div class="gstat"><div class="gstat-val">${g.k}</div><div class="gstat-label">三振</div></div>
      </div>`;
    list.appendChild(d);
  });

  new Chart(document.getElementById('gameChart').getContext('2d'),{
    type:'line',
    data:{
      labels:games.map(g=>g.name),
      datasets:[
        {data:games.map(g=>g.r),borderColor:'#D4A017',backgroundColor:'rgba(212,160,23,0.08)',fill:true,tension:.3,pointRadius:5,pointBackgroundColor:'#D4A017'},
        {data:games.map(g=>g.h),borderColor:'#9A9890',backgroundColor:'transparent',tension:.3,pointRadius:5,pointBackgroundColor:'#9A9890'},
      ]
    },
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        y:{min:0,ticks:{stepSize:3,color:'#5A5956',font:{size:11}},grid:{color:'rgba(255,255,255,0.05)'}},
        x:{ticks:{color:'#5A5956',font:{size:10},maxRotation:30},grid:{display:false}}}}
  });
}

// ══════════ INIT ══════════
buildMySelect();
renderMy();
buildChips();
initGames();
</script>
